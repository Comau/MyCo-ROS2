/**:
    ros__parameters:
        myco_ethernet_name: ens33
        slave_no: [2, 3, 4]
        joint_names: [myco_joint2, myco_joint1, myco_joint3, myco_joint4, myco_joint5, myco_joint6]
        reduction_ratios: [121.0, 121.0, 121.0, 121.0, 101.0, 101.0]
        count_zeros: [2957134, 9658473, 7019675, 5364919, -363389, -2134627]
        axis_position_factors: [131072.0, 131072.0, 131072.0, 131072.0, 131072.0, 131072.0]
        axis_torque_factors: [5251.283, 5251.283, 8533.125, 8533.125, 15975.05, 15975.05]

controller_manager:
  ros__parameters:
    update_rate: 250

    myco_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController
      joints:
        - myco_joint1
        - myco_joint2
        - myco_joint3
        - myco_joint4
        - myco_joint5
        - myco_joint6
      publish_rate: 50
      write_op_modes:
        - myco_joint1
        - myco_joint2
        - myco_joint3
        - myco_joint4
        - myco_joint5
        - myco_joint6

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

myco_arm_controller:
  ros__parameters:
    joints:
     - myco_joint1
     - myco_joint2
     - myco_joint3
     - myco_joint4
     - myco_joint5
     - myco_joint6
    command_interfaces:
      - position
      - velocity
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 250.0
    action_monitor_rate: 250.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.2
      goal_time: 0.6
      myco_joint1: { trajectory: 0.2, goal: 0.1 }
      myco_joint2: { trajectory: 0.2, goal: 0.1 }
      myco_joint3: { trajectory: 0.2, goal: 0.1 }
      myco_joint4: { trajectory: 0.2, goal: 0.1 }
      myco_joint5: { trajectory: 0.2, goal: 0.1 }
      myco_joint6: { trajectory: 0.2, goal: 0.1 }
