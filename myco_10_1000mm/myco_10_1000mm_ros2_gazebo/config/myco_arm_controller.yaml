controller_manager:
  ros__parameters:
    update_rate: 100

    myco_arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController
      joints:
        - myco_joint1
        - myco_joint2
        - myco_joint3
        - myco_joint4
        - myco_joint5
        - myco_joint6
      publish_rate: 50
      write_op_modes:
        - myco_joint1
        - myco_joint2
        - myco_joint3
        - myco_joint4
        - myco_joint5
        - myco_joint6

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

myco_arm_controller:
  ros__parameters:
    joints:
     - myco_joint1
     - myco_joint2
     - myco_joint3
     - myco_joint4
     - myco_joint5
     - myco_joint6
    command_interfaces:
      - position
      - velocity
    state_interfaces:
      - position
      - velocity
    state_publish_rate: 100.0
    action_monitor_rate: 20.0
    allow_partial_joints_goal: false
    constraints:
      stopped_velocity_tolerance: 0.2
      goal_time: 0.0
      myco_joint1: { trajectory: 0.2, goal: 0.1 }
      myco_joint2: { trajectory: 0.2, goal: 0.1 }
      myco_joint3: { trajectory: 0.2, goal: 0.1 }
      myco_joint4: { trajectory: 0.2, goal: 0.1 }
      myco_joint5: { trajectory: 0.2, goal: 0.1 }
      myco_joint6: { trajectory: 0.2, goal: 0.1 }